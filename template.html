<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berry Clever</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --yellow:#F5C800;
  --plum:#7B4F7B;
  --plum-dark:#5a375a;
  --ink:#1A1A2E;
  --ink-soft:#4A4560;
  --ink-muted:#8A8AAA;
  --cream:#FAF8F4;
  --white:#fff;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:var(--plum);
  border-bottom:2px solid rgba(0,0,0,0.12);
  display:flex;align-items:center;justify-content:space-between;
  padding:0.85rem 2.5rem;
  gap:1.5rem;
}

/* Logo — image only, no text */
.nav-logo{
  display:flex;align-items:center;
  text-decoration:none;flex-shrink:0;
}
.nav-logo img{
  height:36px;width:auto;
  display:block;
}

/* Nav links */
.nav-links{
  display:flex;gap:1.75rem;
  list-style:none;align-items:center;
  flex:1;justify-content:center;
}
.nav-links a{
  font-size:0.82rem;font-weight:400;
  color:rgba(255,255,255,0.82);
  text-decoration:none;
  transition:color .2s;
  white-space:nowrap;
}
.nav-links a:hover{color:var(--yellow)}

/* Lang toggle */
.nav-right{display:flex;align-items:center;flex-shrink:0}
.lang-toggle{
  display:flex;align-items:center;
  background:rgba(0,0,0,0.18);
  border-radius:100px;padding:3px;gap:2px;
}
.lang-btn{
  border:none;background:transparent;
  padding:4px 12px;border-radius:100px;
  font-family:'DM Sans',sans-serif;
  font-size:0.75rem;font-weight:500;
  cursor:pointer;transition:all .2s;
  color:rgba(255,255,255,0.6);
}
.lang-btn.active{background:var(--yellow);color:var(--ink)}

/* Hamburger */
.hamburger{
  display:none;flex-direction:column;gap:5px;
  cursor:pointer;background:none;border:none;padding:4px;
  flex-shrink:0;
}
.hamburger span{
  display:block;width:22px;height:2px;
  background:var(--white);border-radius:2px;transition:all .3s;
}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* Mobile menu */
.mobile-menu{
  display:none;
  position:fixed;top:58px;left:0;right:0;z-index:190;
  background:var(--plum);
  border-bottom:2px solid rgba(0,0,0,0.12);
  flex-direction:column;
  padding:1rem 1.5rem 1.25rem;gap:0;
}
.mobile-menu.open{display:flex}
.mobile-menu a{
  font-size:0.9rem;
  color:rgba(255,255,255,0.82);
  text-decoration:none;
  padding:0.6rem 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
  transition:color .2s;
}
.mobile-menu a:last-of-type{border-bottom:none}
.mobile-menu a:hover{color:var(--yellow)}
.mobile-lang{display:flex;gap:0.5rem;margin-top:0.85rem}
.mob-lang-btn{
  border:none;padding:5px 16px;border-radius:100px;
  font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;
  cursor:pointer;transition:all .2s;
  background:rgba(0,0,0,0.18);color:rgba(255,255,255,0.6);
}
.mob-lang-btn.active{background:var(--yellow);color:var(--ink)}

/* ── PAGE CONTENT PLACEHOLDER ── */
.page-content{
  flex:1;
  margin-top:58px; /* height of fixed nav */
  display:flex;align-items:center;justify-content:center;
  min-height:60vh;
  color:var(--ink-muted);
  font-size:0.9rem;
  font-style:italic;
}

/* ── FOOTER ── */
footer{
  background:var(--plum-dark);
  padding:1.25rem 2.5rem;
  display:flex;align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;gap:0.75rem;
}
footer p{font-size:0.75rem;color:rgba(255,255,255,0.3)}
.footer-right{display:flex;align-items:center;gap:1.25rem;flex-wrap:wrap}
.footer-linkedin{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.65);
  padding:0.35rem 0.9rem;border-radius:100px;
  font-size:0.75rem;font-weight:500;
  text-decoration:none;transition:background .2s,color .2s;
}
.footer-linkedin:hover{background:var(--yellow);color:var(--ink)}
.footer-email{
  font-size:0.75rem;color:rgba(255,255,255,0.4);
  text-decoration:none;transition:color .2s;
}
.footer-email:hover{color:var(--yellow)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  nav{padding:0.85rem 1.25rem}
  .nav-links{display:none}
  .nav-right{display:none}
  .hamburger{display:flex}
  footer{padding:1rem 1.25rem;flex-direction:column;align-items:flex-start;gap:0.5rem}
  .footer-right{flex-direction:column;align-items:flex-start;gap:0.4rem}
}
</style>
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <a href="/index.html" class="nav-logo">
    <img src="/RECURSOS/MULTIMEDIA/BRAND/Morita-Ico.png" alt="Berry Clever">
  </a>

  <ul class="nav-links">
    <li><a href="/who-we-are.html" id="nav-who">Quiénes somos</a></li>
    <li><a href="/what-we-do.html" id="nav-what">Qué hacemos</a></li>
    <li><a href="/how-we-do-it.html" id="nav-how">Cómo lo hacemos</a></li>
    <li><a href="/find-us.html" id="nav-find">Dónde encontrarnos</a></li>
  </ul>

  <div class="nav-right">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-esp" onclick="setLang('es')">ESP</button>
      <button class="lang-btn" id="btn-eng" onclick="setLang('en')">ENG</button>
    </div>
  </div>

  <button class="hamburger" id="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobile-menu">
  <a href="/who-we-are.html" id="mob-who">Quiénes somos</a>
  <a href="/what-we-do.html" id="mob-what">Qué hacemos</a>
  <a href="/how-we-do-it.html" id="mob-how">Cómo lo hacemos</a>
  <a href="/find-us.html" id="mob-find">Dónde encontrarnos</a>
  <div class="mobile-lang">
    <button class="mob-lang-btn active" id="mob-btn-esp" onclick="setLang('es')">ESP</button>
    <button class="mob-lang-btn" id="mob-btn-eng" onclick="setLang('en')">ENG</button>
  </div>
</div>

<!-- ── PAGE CONTENT GOES HERE ── -->
<div class="page-content">
  <p>[ page content goes here ]</p>
</div>

<!-- ── FOOTER ── -->
<footer>
  <p>© 2026 Berry Clever · Bogotá, Colombia</p>
  <div class="footer-right">
    <a href="https://www.linkedin.com/company/berryclever/posts/?feedView=all"
       target="_blank" class="footer-linkedin">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
      LinkedIn
    </a>
    <a href="mailto:BerryClever@proton.me" class="footer-email">BerryClever@proton.me</a>
  </div>
</footer>

<script>
const navTx = {
  es: {
    'nav-who':  'Quiénes somos',
    'nav-what': 'Qué hacemos',
    'nav-how':  'Cómo lo hacemos',
    'nav-find': 'Dónde encontrarnos',
    'mob-who':  'Quiénes somos',
    'mob-what': 'Qué hacemos',
    'mob-how':  'Cómo lo hacemos',
    'mob-find': 'Dónde encontrarnos',
  },
  en: {
    'nav-who':  'Who we are',
    'nav-what': 'What we do',
    'nav-how':  'How we do it',
    'nav-find': 'Where to find us',
    'mob-who':  'Who we are',
    'mob-what': 'What we do',
    'mob-how':  'How we do it',
    'mob-find': 'Where to find us',
  }
};

function setLang(l) {
  // Nav labels
  const d = navTx[l];
  for (const [id, val] of Object.entries(d)) {
    const el = document.getElementById(id);
    if (el) el.textContent = val;
  }
  // Toggle buttons
  ['btn-esp','mob-btn-esp'].forEach(id => document.getElementById(id).classList.toggle('active', l==='es'));
  ['btn-eng','mob-btn-eng'].forEach(id => document.getElementById(id).classList.toggle('active', l==='en'));

  // Page-level translation hook — each page defines this if needed
  if (typeof setPageLang === 'function') setPageLang(l);

  document.documentElement.lang = l;
}

function toggleMenu() {
  document.getElementById('mobile-menu').classList.toggle('open');
  document.getElementById('hamburger').classList.toggle('open');
}
</script>

</body>
</html>
